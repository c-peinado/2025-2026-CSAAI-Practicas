<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOM</title>

    <!-- Hoja de estilo -->
    <link rel="stylesheet" href="boom.css">

    <!-- Código javascript -->
    <script src="crono.js"></script>
    <script src="boom.js" defer></script>
</head>
<body>
    <h2>B O O M</h2>
    <div id="d1">
        <div id="d2">
            <button class="digito">*</button>
            <button class="digito">*</button>
            <button class="digito">*</button>
            <button class="digito">*</button>
            <p id="display">0:0:0</p>
            <p id="intentos">Intentos restantes: 7</p>
            <p id="mensaje">Nueva partida preparada. Pulsa start o un número para comenzar.</p>
        </div>
        <div id="d3">
            <button id = b7 class="numero">7</button>
            <button id = b8 class="numero">8</button>
            <button id = b9 class="numero">9</button>
            <br>
            <button id = b4 class="numero">4</button>
            <button id = b5 class="numero">5</button>
            <button id = b6 class="numero">6</button>
            <br>
            <button id = b1 class="numero">1</button>
            <button id = b2 class="numero">2</button>
            <button id = b3 class="numero">3</button>
            <br>
            <button id = b0 class="numero">0</button>
            <br>
            <button id = start>START</button>
            <button id = stop>STOP</button>
            <button id = reset>RESET</button>

        </div>
    </div>
</body>
