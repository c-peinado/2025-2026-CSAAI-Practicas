<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Beat the Word</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Beat the Word</h1>

  <div class="controls">
    <button id="startBtn">Comenzar</button>
    <button id="stopBtn">Detener</button>

    <label>
      Música
      <input type="checkbox" id="musicToggle">
    </label>

    <label>
      Pareja:
      <select id="pairSelect">
        <option value="0">Sol / Luna</option>
        <option value="1">Cama / Casa</option>
      </select>
    </label>

    <label>
      Nivel inicial:
      <select id="levelSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </label>
  </div>

  <div class="info">
    <p>Nivel: <span id="level">-</span></p>
    <p>Tiempo: <span id="time">0</span>s</p>
    <p>Estado: <span id="status">Esperando</span></p>
  </div>

  <div id="mainWord">---</div>

  <div class="grid" id="grid"></div>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script src="game.js"></script>
</body>
</html>
